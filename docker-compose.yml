services:
  hookwatch:
    image: hookwatch:local
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      HOOKWATCH_PORT: "${HOOKWATCH_PORT:-8080}"
      HOOKWATCH_DATA_DIR: /data
      HOOKWATCH_AUTH_MODE: "${HOOKWATCH_AUTH_MODE:-none}"
      HOOKWATCH_ALLOW_REGISTRATION: "${HOOKWATCH_ALLOW_REGISTRATION:-false}"
      HOOKWATCH_OIDC_ISSUER: "${HOOKWATCH_OIDC_ISSUER:-}"
      HOOKWATCH_OIDC_CLIENT_ID: "${HOOKWATCH_OIDC_CLIENT_ID:-}"
      HOOKWATCH_OIDC_CLIENT_SECRET: "${HOOKWATCH_OIDC_CLIENT_SECRET:-}"
      HOOKWATCH_TOKEN_TTL: "${HOOKWATCH_TOKEN_TTL:-168h}"
      HOOKWATCH_MAX_REQUESTS: "${HOOKWATCH_MAX_REQUESTS:-500}"
      HOOKWATCH_TOKEN_CLEANUP_INTERVAL: "${HOOKWATCH_TOKEN_CLEANUP_INTERVAL:-1h}"
    volumes:
      - hookwatch-data:/data
    restart: unless-stopped

volumes:
  hookwatch-data:
